# Installed to /app/share/pipewire/client.conf.d/ by the Flatpak manifest.
#
# WirePlumber grants flatpak-flagged PipeWire clients read+execute only and
# SILENTLY DISCARDS their metadata writes — pw-metadata exits 0, the default
# microphone never changes. Clients that declare themselves a Manager get
# full access (rwxm); this is the sanctioned mechanism session-management
# apps use from inside a sandbox (EasyEffects sets it on its context,
# pavucontrol ships it as PULSE_PROP_media.category=Manager).
#
# Client properties come from context.properties, so this drop-in — merged
# into every libpipewire client whose config root is /app/share/pipewire,
# i.e. exactly the pw-* tools bundled in this Flatpak — is what lets
# "Set as default microphone" (pw-metadata set/delete on
# default.configured.audio.source) keep working. The filter-chain child
# daemon does NOT read client.conf and keeps plain rx permissions: creating
# and feeding the virtual mic needs nothing more.
#
# pipewire::can_set_default() checks for this file at its installed path —
# keep the two in lockstep.
context.properties = {
    media.category = "Manager"
}

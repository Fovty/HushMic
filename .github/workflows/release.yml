name: release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    name: Build and publish release artifacts
    runs-on: ubuntu-latest
    # Build inside the OLDEST supported base: artifacts inherit the build
    # host's glibc requirement, and building straight on ubuntu-latest
    # (24.04, glibc 2.39) produces binaries that refuse to run on
    # Ubuntu 22.04 / Debian 12 / RHEL 9. ubuntu:22.04 = glibc 2.35.
    container: ubuntu:22.04
    steps:
      - name: Install system dependencies
        # python3.11 (jammy universe): dpdfnet==0.5.1 requires Python >=3.11,
        # jammy's default python3 is 3.10; setup-assets.sh honors $PYTHON.
        run: |
          apt-get update
          DEBIAN_FRONTEND=noninteractive apt-get install -y --no-install-recommends \
            build-essential pkg-config git curl ca-certificates binutils file \
            python3.11 python3.11-venv squashfs-tools desktop-file-utils

      # Actions are pinned to commit SHAs: a hijacked mutable tag on a
      # third-party action (esp. the release-publishing one, which holds a
      # contents:write token) could replace the artifacts users run as root.
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Check tag matches the workspace version
        run: |
          V="$(grep -m1 '^version' Cargo.toml | sed -E 's/.*"([^"]+)".*/\1/')"
          if [ "v$V" != "$GITHUB_REF_NAME" ]; then
            echo "::error::tag $GITHUB_REF_NAME does not match Cargo.toml version $V — bump Cargo.toml (+ PKGBUILD pkgver, README .deb URL) before tagging"
            exit 1
          fi

      - name: Install Rust (stable)
        uses: dtolnay/rust-toolchain@fa04a1451ff1842e2626ccb99004d0195b455a88 # master (pinned)
        with:
          toolchain: stable

      - name: Cache cargo
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-2204-${{ hashFiles('**/Cargo.lock') }}

      - name: Install cargo-deb
        run: cargo install cargo-deb --version 3.7.0 --locked

      - name: Build release artifacts
        run: bash packaging/build-release.sh
        env:
          PYTHON: python3.11

      - name: Enforce the glibc floor
        run: bash scripts/check-glibc-floor.sh

      - name: List artifacts
        run: ls -lh dist/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@3bb12739c298aeb8a4eeaf626c5b8d85266b0e65 # v2
        with:
          files: |
            dist/hushmic-x86_64.AppImage
            dist/hushmic_*_amd64.deb
            dist/hushmic-*-x86_64.tar.gz
            dist/sha256sums.txt
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  aur:
    name: Publish to AUR (disabled)
    needs: release
    if: false
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Configure SSH for AUR
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.AUR_SSH_KEY }}" > ~/.ssh/aur
          chmod 600 ~/.ssh/aur
          ssh-keyscan aur.archlinux.org >> ~/.ssh/known_hosts
          cat > ~/.ssh/config <<'EOF'
          Host aur.archlinux.org
            User aur
            IdentityFile ~/.ssh/aur
          EOF

      - name: Clone AUR package repo
        run: git clone ssh://aur@aur.archlinux.org/hushmic.git aur-repo

      - name: Update PKGBUILD and .SRCINFO
        run: |
          cd aur-repo
          VERSION="${GITHUB_REF_NAME#v}"
          cp ../packaging/PKGBUILD PKGBUILD
          sed -i "s/^pkgver=.*/pkgver=${VERSION}/" PKGBUILD
          # makepkg --printsrcinfo > .SRCINFO   # run on an Arch container/runner
          git config user.name "hushmic"
          git config user.email "hushmic@users.noreply.github.com"
          git add PKGBUILD .SRCINFO || git add PKGBUILD
          git commit -m "Update to ${VERSION}"

      - name: Push to AUR
        run: |
          cd aur-repo
          git push origin master

name: release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    name: Build and publish release artifacts
    runs-on: ubuntu-latest
    # Build inside the OLDEST supported base: artifacts inherit the build
    # host's glibc requirement, and building straight on ubuntu-latest
    # (24.04, glibc 2.39) produces binaries that refuse to run on
    # Ubuntu 22.04 / Debian 12 / RHEL 9. ubuntu:22.04 = glibc 2.35.
    container: ubuntu:22.04
    steps:
      - name: Install system dependencies
        # python3.11 (jammy universe): dpdfnet==0.5.1 requires Python >=3.11,
        # jammy's default python3 is 3.10; setup-assets.sh honors $PYTHON.
        run: |
          apt-get update
          DEBIAN_FRONTEND=noninteractive apt-get install -y --no-install-recommends \
            build-essential pkg-config git curl ca-certificates binutils file \
            python3.11 python3.11-venv squashfs-tools desktop-file-utils

      # Actions are pinned to commit SHAs: a hijacked mutable tag on a
      # third-party action (esp. the release-publishing one, which holds a
      # contents:write token) could replace the artifacts users run as root.
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Check tag matches the workspace version
        run: |
          V="$(grep -m1 '^version' Cargo.toml | sed -E 's/.*"([^"]+)".*/\1/')"
          if [ "v$V" != "$GITHUB_REF_NAME" ]; then
            echo "::error::tag $GITHUB_REF_NAME does not match Cargo.toml version $V — bump Cargo.toml (+ PKGBUILD pkgver, README .deb URL, flatpak metainfo release entry) before tagging"
            exit 1
          fi
          # The AppStream metainfo ships verbatim inside the flatpak: a tag
          # whose version has no <release> entry would advertise the previous
          # release as latest (and fail Flathub's appstream lint).
          if ! grep -q "<release version=\"$V\"" packaging/flatpak/io.github.fovty.HushMic.metainfo.xml; then
            echo "::error::packaging/flatpak/io.github.fovty.HushMic.metainfo.xml has no <release version=\"$V\"> entry — add it before tagging"
            exit 1
          fi

      - name: Install Rust (stable)
        uses: dtolnay/rust-toolchain@fa04a1451ff1842e2626ccb99004d0195b455a88 # master (pinned)
        with:
          toolchain: stable

      - name: Cache cargo
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-2204-${{ hashFiles('**/Cargo.lock') }}

      - name: Install cargo-deb
        run: cargo install cargo-deb --version 3.7.0 --locked

      - name: Build release artifacts
        run: bash packaging/build-release.sh
        env:
          PYTHON: python3.11

      - name: Enforce the glibc floor
        run: bash scripts/check-glibc-floor.sh

      - name: List artifacts
        run: ls -lh dist/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@3bb12739c298aeb8a4eeaf626c5b8d85266b0e65 # v2
        with:
          files: |
            dist/hushmic-x86_64.AppImage
            dist/hushmic_*_amd64.deb
            dist/hushmic-*-x86_64.tar.gz
            dist/sha256sums.txt
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  aur:
    name: Publish to AUR
    needs: release
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Set pkgver from the release tag
        run: sed -i "s/^pkgver=.*/pkgver=${GITHUB_REF_NAME#v}/" packaging/PKGBUILD

      # Clones the AUR repo, re-hashes the new tag tarball (updpkgsums) and
      # regenerates .SRCINFO in an Arch container, then commits and pushes.
      # Pinned to a commit SHA like every other action here.
      - name: Publish to AUR
        uses: KSXGitHub/github-actions-deploy-aur@084b0d9b15415bf9cdb65d44dad1efe37a354050 # v4.2.0
        with:
          pkgname: hushmic
          pkgbuild: packaging/PKGBUILD
          commit_username: Fovty
          commit_email: 38868829+Fovty@users.noreply.github.com
          ssh_private_key: ${{ secrets.AUR_SSH_KEY }}
          commit_message: "Update to ${{ github.ref_name }}"
          ssh_keyscan_types: ed25519
          updpkgsums: true

  aur-bin:
    name: Publish hushmic-bin to the AUR
    needs: release
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Set pkgver from the release tag
        run: sed -i "s/^pkgver=.*/pkgver=${GITHUB_REF_NAME#v}/" packaging/aur-bin/PKGBUILD

      # Same flow as the source package, but the source= here is the release
      # ASSET this run just published, so updpkgsums re-hashes the artifact
      # rather than the tag tarball. Depends on `release` for exactly that.
      - name: Publish to AUR
        uses: KSXGitHub/github-actions-deploy-aur@084b0d9b15415bf9cdb65d44dad1efe37a354050 # v4.2.0
        with:
          pkgname: hushmic-bin
          pkgbuild: packaging/aur-bin/PKGBUILD
          commit_username: Fovty
          commit_email: 38868829+Fovty@users.noreply.github.com
          ssh_private_key: ${{ secrets.AUR_SSH_KEY }}
          commit_message: "Update to ${{ github.ref_name }}"
          ssh_keyscan_types: ed25519
          updpkgsums: true

  copr:
    name: Build the Fedora COPR package
    needs: release
    runs-on: ubuntu-latest
    # Fedora tooling (rpmbuild/spectool/copr-cli) isn't on the stock runner;
    # only the SRPM is assembled here — COPR does the per-chroot builds. Pinned
    # to a release rather than :latest, which would silently roll onto the next
    # Fedora major in a job that holds the API token.
    container: fedora:44
    steps:
      - name: Install tooling
        run: dnf install -y --setopt=install_weak_deps=False rpm-build rpmdevtools copr-cli git

      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      # Everything up to the SRPM needs no credentials, so it runs on every tag:
      # that keeps proving the spec still builds even while COPR is unconfigured,
      # instead of going untested until the day the token is added.
      - name: Set the version and changelog from the release tag
        # Block scalar: the sed expression contains ": ", which YAML would
        # otherwise read as a mapping and fail to parse the whole workflow.
        run: |
          V="${GITHUB_REF_NAME#v}"
          sed -i "s/^Version:.*/Version:        $V/" packaging/hushmic.spec
          # The changelog has to move with the version: rpm derives
          # SOURCE_DATE_EPOCH from the newest entry and clamps every packaged
          # file's mtime to it, so a stale entry would both misreport the
          # release and freeze mtimes at the old date.
          printf '* %s Fovty <38868829+Fovty@users.noreply.github.com> - %s-1\n- Update to %s.\n\n' \
            "$(LC_ALL=C date -u '+%a %b %d %Y')" "$V" "$V" > /tmp/changelog.entry
          sed -i "/^%changelog$/r /tmp/changelog.entry" packaging/hushmic.spec

      - name: Build the SRPM
        run: |
          rpmdev-setuptree
          spectool -g -R packaging/hushmic.spec
          rpmbuild -bs packaging/hushmic.spec

      # COPR needs an account + API token this repo may not have yet. Skip only
      # the submission, not the build above, and never fail the release over it.
      - name: Check whether COPR is configured
        id: gate
        env:
          COPR_CONFIG: ${{ secrets.COPR_API_CONFIG }}
        run: |
          if [ -z "$COPR_CONFIG" ]; then
            echo "::notice::COPR_API_CONFIG is not set — SRPM built but not submitted."
            echo "configured=false" >> "$GITHUB_OUTPUT"
          else
            echo "configured=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Write the COPR credentials
        if: steps.gate.outputs.configured == 'true'
        env:
          COPR_CONFIG: ${{ secrets.COPR_API_CONFIG }}
        run: |
          mkdir -p ~/.config
          printf '%s' "$COPR_CONFIG" > ~/.config/copr
          chmod 600 ~/.config/copr

      - name: Submit the build to COPR
        if: steps.gate.outputs.configured == 'true'
        run: copr-cli build "${{ vars.COPR_PROJECT || 'fovty/hushmic' }}" ~/rpmbuild/SRPMS/hushmic-*.src.rpm

  nix:
    name: Trigger the NixOS flake update
    needs: release
    runs-on: ubuntu-latest
    steps:
      # Fire the self-maintained hushmic-nix fork's updater the moment a release
      # lands so the flake tracks the new version immediately (it also runs on a
      # daily cron as a fallback). Needs a token with actions:write on the fork.
      - name: Dispatch hushmic-nix update
        env:
          GH_TOKEN: ${{ secrets.NIX_FORK_TOKEN }}
        run: gh workflow run update.yml --repo Fovty/hushmic-nix

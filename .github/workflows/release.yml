name: release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    name: Build and publish release artifacts
    runs-on: ubuntu-latest
    # Build inside the OLDEST supported base: artifacts inherit the build
    # host's glibc requirement, and building straight on ubuntu-latest
    # (24.04, glibc 2.39) produces binaries that refuse to run on
    # Ubuntu 22.04 / Debian 12 / RHEL 9. ubuntu:22.04 = glibc 2.35.
    container: ubuntu:22.04
    steps:
      - name: Install system dependencies
        # python3.11 (jammy universe): dpdfnet==0.5.1 requires Python >=3.11,
        # jammy's default python3 is 3.10; setup-assets.sh honors $PYTHON.
        run: |
          apt-get update
          DEBIAN_FRONTEND=noninteractive apt-get install -y --no-install-recommends \
            build-essential pkg-config git curl ca-certificates binutils file \
            python3.11 python3.11-venv squashfs-tools desktop-file-utils

      # Actions are pinned to commit SHAs: a hijacked mutable tag on a
      # third-party action (esp. the release-publishing one, which holds a
      # contents:write token) could replace the artifacts users run as root.
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Check tag matches the workspace version
        run: |
          V="$(grep -m1 '^version' Cargo.toml | sed -E 's/.*"([^"]+)".*/\1/')"
          if [ "v$V" != "$GITHUB_REF_NAME" ]; then
            echo "::error::tag $GITHUB_REF_NAME does not match Cargo.toml version $V — bump Cargo.toml (+ PKGBUILD pkgver, README .deb URL) before tagging"
            exit 1
          fi

      - name: Install Rust (stable)
        uses: dtolnay/rust-toolchain@fa04a1451ff1842e2626ccb99004d0195b455a88 # master (pinned)
        with:
          toolchain: stable

      - name: Cache cargo
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-2204-${{ hashFiles('**/Cargo.lock') }}

      - name: Install cargo-deb
        run: cargo install cargo-deb --version 3.7.0 --locked

      - name: Build release artifacts
        run: bash packaging/build-release.sh
        env:
          PYTHON: python3.11

      - name: Enforce the glibc floor
        run: bash scripts/check-glibc-floor.sh

      - name: List artifacts
        run: ls -lh dist/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@3bb12739c298aeb8a4eeaf626c5b8d85266b0e65 # v2
        with:
          files: |
            dist/hushmic-x86_64.AppImage
            dist/hushmic_*_amd64.deb
            dist/hushmic-*-x86_64.tar.gz
            dist/sha256sums.txt
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  aur:
    name: Publish to AUR
    needs: release
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Set pkgver from the release tag
        run: sed -i "s/^pkgver=.*/pkgver=${GITHUB_REF_NAME#v}/" packaging/PKGBUILD

      # Clones the AUR repo, re-hashes the new tag tarball (updpkgsums) and
      # regenerates .SRCINFO in an Arch container, then commits and pushes.
      # Pinned to a commit SHA like every other action here.
      - name: Publish to AUR
        uses: KSXGitHub/github-actions-deploy-aur@084b0d9b15415bf9cdb65d44dad1efe37a354050 # v4.2.0
        with:
          pkgname: hushmic
          pkgbuild: packaging/PKGBUILD
          commit_username: Fovty
          commit_email: 38868829+Fovty@users.noreply.github.com
          ssh_private_key: ${{ secrets.AUR_SSH_KEY }}
          commit_message: "Update to ${{ github.ref_name }}"
          ssh_keyscan_types: ed25519
          updpkgsums: true

  nix:
    name: Trigger the NixOS flake update
    needs: release
    runs-on: ubuntu-latest
    steps:
      # Fire the self-maintained hushmic-nix fork's updater the moment a release
      # lands so the flake tracks the new version immediately (it also runs on a
      # daily cron as a fallback). Needs a token with actions:write on the fork.
      - name: Dispatch hushmic-nix update
        env:
          GH_TOKEN: ${{ secrets.NIX_FORK_TOKEN }}
        run: gh workflow run update.yml --repo Fovty/hushmic-nix

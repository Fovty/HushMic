name: Feature request
description: Suggest an idea or improvement.
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: What problem would this solve?
      description: The use case or friction you're hitting, not just the solution.
    validations:
      required: true
  - type: textarea
    id: idea
    attributes:
      label: Proposed idea
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives or workarounds you've considered
